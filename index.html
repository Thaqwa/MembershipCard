<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Member Scanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-slate-900 p-6 text-white text-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">ScanStation</h1>
            <p class="text-[10px] text-slate-400 tracking-[0.2em] uppercase mt-1">High-Speed Recognition</p>
        </div>

        <div class="p-5">
            <div id="reader" class="overflow-hidden rounded-2xl bg-black mb-4 aspect-square shadow-inner border-4 border-slate-100"></div>
            
            <button id="cameraToggle" onclick="toggleCamera()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                <span id="btnIcon">📷</span> <span id="btnText">Start Scanner</span>
            </button>
        </div>

        <div class="p-5 bg-slate-50 border-t border-slate-100">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-slate-500 font-bold text-xs uppercase">Recent Scans</h3>
                <span id="count" class="bg-indigo-100 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
            </div>
            <div id="scans" class="space-y-2 max-h-48 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let html5QrCode;
        let isCameraRunning = false;

        // AUTHENTIC SCANNER SOUND (Online Source)
        const scannerBeep = new Audio("https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3");
        
        // Preload the sound so there is zero lag on the first scan
        scannerBeep.load();

        function onScanSuccess(decodedText, decodedResult) {
            // Play the "Real" sound immediately
            scannerBeep.currentTime = 0;
            scannerBeep.play();

            // Vibrate mobile device (haptic feedback)
            if (navigator.vibrate) navigator.vibrate(100);

            // Log the scan
            addScanToHistory(decodedText);
            
            // Show Success Alert
            Swal.fire({
                title: 'Scanned!',
                text: decodedText,
                icon: 'success',
                timer: 1500,
                showConfirmButton: false,
                borderBox: '20px'
            });
        }

        function toggleCamera() {
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            if (!isCameraRunning) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 15, qrbox: { width: 250, height: 250 } },
                    onScanSuccess
                ).then(() => {
                    isCameraRunning = true;
                    btnText.innerText = "Stop Scanner";
                    btnIcon.innerText = "🛑";
                });
            } else {
                html5QrCode.stop().then(() => {
                    isCameraRunning = false;
                    btnText.innerText = "Start Scanner";
                    btnIcon.innerText = "📷";
                    document.getElementById('reader').innerHTML = '';
                });
            }
        }

        function addScanToHistory(text) {
            const container = document.getElementById('scans');
            const count = document.getElementById('count');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const div = document.createElement('div');
            div.className = "flex justify-between items-center p-3 bg-white rounded-xl border border-slate-200 shadow-sm animate-fade-in";
            div.innerHTML = `
                <span class="text-sm font-medium text-slate-700 truncate mr-4">${text}</span>
                <span class="text-[10px] text-slate-400 font-mono">${time}</span>
            `;
            container.prepend(div);
            count.innerText = container.children.length;
        }
    </script>

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
    </style>
</body>
</html>
